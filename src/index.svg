<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 400"
     width="800"
     height="400">

    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#0d1117"/>
            <stop offset="100%" stop-color="#010409"/>
        </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="800"
          height="400"
          fill="url(#bg)"
          rx="12"
          stroke="#30363d"
          stroke-width="1"/>

    <!-- Cat -->
    <g transform="translate(40 40)">
        <circle cx="50" cy="50" r="40" fill="#8b949e"/>

        <polygon points="15,30 30,-10 45,20"
                 fill="#8b949e"/>

        <polygon points="85,30 70,-10 55,20"
                 fill="#8b949e"/>

        <circle cx="50" cy="55" r="25" fill="#ffffff"/>

        <circle cx="35" cy="45" r="4" fill="#010409"/>
        <circle cx="65" cy="45" r="4" fill="#010409"/>

        <polygon points="45,55 55,55 50,62"
                 fill="#010409"/>
    </g>

    <!-- Header -->
    <text x="150"
          y="70"
          fill="#e6edf3"
          font-family="monospace"
          font-size="24"
          font-weight="bold">
        Akeanti
    </text>

    <text x="150"
          y="95"
          fill="#8b949e"
          font-family="monospace"
          font-size="14">
        CPGE MP | Systems Researcher | OSS Contributor
    </text>

    <text x="150"
          y="115"
          fill="#8b949e"
          font-family="monospace"
          font-size="12">
        Mom once told me I&apos;d be successful. Sorry mom, I became garbage...
    </text>

    <!-- Divider -->
    <line x1="40"
          y1="140"
          x2="760"
          y2="140"
          stroke="#30363d"
          stroke-width="1"/>

    <!-- Left Terminal -->
    <text x="40"
          y="180"
          fill="#58a6ff"
          font-family="monospace"
          font-size="14"
          font-weight="bold">
        akeanti@archlinux:~$ cat capabilities.log
    </text>

    <text x="40"
          y="210"
          fill="#3fb950"
          font-family="monospace"
          font-size="14">
        &gt; OS_PREF : Arch Linux, Linux Mint
    </text>

    <text x="40"
          y="235"
          fill="#3fb950"
          font-family="monospace"
          font-size="14">
        &gt; CORE    : C++, Rust, Python, C, SQL, LaTeX
    </text>

    <text x="40"
          y="260"
          fill="#3fb950"
          font-family="monospace"
          font-size="14">
        &gt; DOMAIN  : Kernel Dev, Low-Level Architecture
    </text>

    <text x="40"
          y="285"
          fill="#3fb950"
          font-family="monospace"
          font-size="14">
        &gt; FOCUS   : Mathematics, Cyber Security, OSINT
    </text>

    <!-- Right Terminal -->
    <text x="420"
          y="180"
          fill="#58a6ff"
          font-family="monospace"
          font-size="14"
          font-weight="bold">
        akeanti@archlinux:~$ ls -l projects/
    </text>

    <!-- Project Card 1 -->
    <g transform="translate(420 200)">
        <rect width="340"
              height="70"
              fill="#161b22"
              rx="6"
              stroke="#30363d"
              stroke-width="1"/>

        <text x="15"
              y="28"
              fill="#e6edf3"
              font-family="monospace"
              font-size="16"
              font-weight="bold">
            FoxIT
        </text>

        <text x="15"
              y="48"
              fill="#8b949e"
              font-family="monospace"
              font-size="12">
            Open-source Discord extension
        </text>

        <text x="15"
              y="64"
              fill="#8b949e"
              font-family="monospace"
              font-size="12">
            Fake Nitro perks implementation
        </text>
    </g>

    <!-- Project Card 2 -->
    <g transform="translate(420 285)">
        <rect width="340"
              height="70"
              fill="#161b22"
              rx="6"
              stroke="#30363d"
              stroke-width="1"/>

        <text x="15"
              y="28"
              fill="#e6edf3"
              font-family="monospace"
              font-size="16"
              font-weight="bold">
            Discord Mathspal
        </text>

        <text x="15"
              y="48"
              fill="#8b949e"
              font-family="monospace"
              font-size="12">
            Mathematical database repository
        </text>

        <text x="15"
              y="64"
              fill="#8b949e"
              font-family="monospace"
              font-size="12">
            Handwritten CPGE mathematics archive
        </text>
    </g>

</svg>
